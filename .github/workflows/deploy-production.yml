name: Deploy Production (Cloudflare)

on:
  push:
    tags:
      - 'v*'  # Acionado por tags de versão: git tag v1.0.0 && git push origin v1.0.0

jobs:
  deploy:
    name: Deploy to Cloudflare Production
    runs-on: ubuntu-latest
    environment: production  # Requer aprovação manual no GitHub Environments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Etapa 1: Migrations D1 produção ────────────────────────
      - name: Apply D1 Migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply siscr-shared-production --env production

      # ─── Etapa 2: Deploy Worker produção ────────────────────────
      - name: Deploy API Worker (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --env production

      # ─── Etapa 3: Build frontend produção ───────────────────────
      - name: Build Frontend (production)
        run: pnpm --filter=@siscr/web run build
        env:
          VITE_API_URL: https://api.seudominio.com.br

      # ─── Etapa 4: Deploy Pages produção ─────────────────────────
      - name: Deploy Frontend to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=siscr-web --branch=production

      - name: Summary
        run: |
          echo "## Deploy Produção Concluído! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Versão:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** https://api.seudominio.com.br" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** https://app.seudominio.com.br" >> $GITHUB_STEP_SUMMARY
