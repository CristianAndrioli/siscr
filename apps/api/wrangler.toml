name = "siscr-api"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────
# Variáveis de ambiente (não-secretas)
# ──────────────────────────────────────────────
[vars]
ENVIRONMENT = "development"
APP_URL = "http://localhost:8787"
FRONTEND_URL = "http://localhost:5173"
ALLOWED_ORIGINS = "http://localhost:5173"

# ──────────────────────────────────────────────
# D1 — Banco compartilhado (tenants, planos, billing)
# ──────────────────────────────────────────────
[[d1_databases]]
binding = "DB_SHARED"
database_name = "siscr-shared-staging"
database_id = "20ed0f6a-54fd-41f4-8cf2-36032ef60da1"
migrations_dir = "../../packages/db/migrations/shared"

# ──────────────────────────────────────────────
# KV — Sessões, cache de tenant routing
# ──────────────────────────────────────────────
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "7ebafa6b64e24c56abea57f8d0998c94"

[[kv_namespaces]]
binding = "KV_TENANT_CACHE"
id = "1119412c979c4f4ba0e4b4c247720c93"

# ──────────────────────────────────────────────
# R2 — Desativado no staging (ativar quando habilitar R2 no painel)
# ──────────────────────────────────────────────
# [[r2_buckets]]
# binding = "R2_STORAGE"
# bucket_name = "siscr-storage"

# ──────────────────────────────────────────────
# Queues — Tarefas assíncronas (emails, relatórios)
# ──────────────────────────────────────────────
[[queues.producers]]
binding = "QUEUE_TASKS"
queue = "siscr-tasks-staging"

[[queues.consumers]]
queue = "siscr-tasks-staging"
max_batch_size = 10
max_batch_timeout = 30

# ──────────────────────────────────────────────
# Cron Triggers — Tarefas agendadas
# ──────────────────────────────────────────────
[triggers]
crons = [
  "0 6 * * *",   # 06:00 UTC diário — verificar vencimentos
  "0 3 * * *",   # 03:00 UTC diário — renovação de assinaturas
  "*/30 * * * *" # A cada 30 min — conciliação de pagamentos
]

# ──────────────────────────────────────────────
# Ambiente: staging (testes sem afetar produção)
# ──────────────────────────────────────────────
[env.staging]
name = "siscr-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
APP_URL = "https://siscr-api-staging.lucaspercisi.workers.dev"
FRONTEND_URL = "https://staging.siscr-web.pages.dev"
ALLOWED_ORIGINS = "https://staging.siscr-web.pages.dev"
# Price IDs do Stripe (Teste) — substitua com os IDs reais do painel Stripe
STRIPE_PRICE_STARTER  = "price_PLACEHOLDER_STARTER"
STRIPE_PRICE_BUSINESS = "price_PLACEHOLDER_BUSINESS"

[[env.staging.d1_databases]]
binding = "DB_SHARED"
database_name = "siscr-shared-staging"
database_id = "20ed0f6a-54fd-41f4-8cf2-36032ef60da1"
migrations_dir = "../../packages/db/migrations/shared"

[[env.staging.kv_namespaces]]
binding = "KV_SESSIONS"
id = "7ebafa6b64e24c56abea57f8d0998c94"

[[env.staging.kv_namespaces]]
binding = "KV_TENANT_CACHE"
id = "1119412c979c4f4ba0e4b4c247720c93"

# [[env.staging.r2_buckets]]
# binding = "R2_STORAGE"
# bucket_name = "siscr-storage-staging"

[[env.staging.queues.producers]]
binding = "QUEUE_TASKS"
queue = "siscr-tasks-staging"

# ──────────────────────────────────────────────
# Ambiente: production
# ──────────────────────────────────────────────
[env.production]
name = "siscr-api-production"

[env.production.vars]
ENVIRONMENT = "production"
APP_URL = "https://api.seudominio.com.br"
FRONTEND_URL = "https://app.seudominio.com.br"
ALLOWED_ORIGINS = "https://app.seudominio.com.br"

[[env.production.d1_databases]]
binding = "DB_SHARED"
database_name = "siscr-shared-production"
database_id = "PLACEHOLDER_PROD_SHARED_DB_ID"
migrations_dir = "../../packages/db/migrations/shared"

[[env.production.kv_namespaces]]
binding = "KV_SESSIONS"
id = "PLACEHOLDER_PROD_KV_SESSIONS_ID"

[[env.production.kv_namespaces]]
binding = "KV_TENANT_CACHE"
id = "PLACEHOLDER_PROD_KV_TENANT_CACHE_ID"

[[env.production.r2_buckets]]
binding = "R2_STORAGE"
bucket_name = "siscr-storage-production"

[[env.production.queues.producers]]
binding = "QUEUE_TASKS"
queue = "siscr-tasks-production"
